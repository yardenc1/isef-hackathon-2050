<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@700;800;900&display=swap" rel="stylesheet">
  <title>ISEF Banner</title>
</head>
<body style="margin:0; padding:0; background:transparent;">

<div style="direction:rtl; background:#152560; width:570px; height:214px; border-radius:10px; border:2px solid #F5821F; font-family:'Segoe UI', Arial, sans-serif; box-sizing:border-box; display:flex; align-items:stretch; overflow:hidden; position:relative;">

  <div style="position:absolute; top:8px; right:10px; display:flex; align-items:flex-end; gap:6px; z-index:10;">
    <img
      src="../../public/logos/mada-boneh-hevra-white.png"
      alt="מדע בונה חברה"
      style="height:18px; max-width:70px; width:auto; object-fit:contain; display:block;"
    />
    <img
      src="../../public/logos/isef-white.png"
      alt="ISEF"
      style="height:18px; width:auto; object-fit:contain; display:block;"
    />
  </div>

  <div style="width:170px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:34px 10px 18px; border-left:1px solid rgba(245,130,31,0.3);">
    <div style="font-size:13px; color:white; opacity:0.78; margin-bottom:6px; text-align:center;">חולמים על יזמות?</div>
    <div style="font-family:'Assistant', sans-serif; font-size:46px; font-weight:900; color:white; line-height:1; margin-bottom:6px; letter-spacing:1.5px;">
      האקתון
    </div>
    <div style="font-size:18px; font-weight:900; color:#F5821F; letter-spacing:4px; margin-bottom:10px;">ISEF 2050</div>
    <div style="width:96px; height:2px; background:#F5821F; opacity:0.4; margin-bottom:10px;"></div>
    <div style="font-size:12px; color:white; opacity:0.78; text-align:center; line-height:1.6;">קהילת אייסף<br/>בצוותים מעורבים</div>
  </div>

  <div style="flex:1; min-width:0; display:flex; flex-direction:column; justify-content:center; padding:30px 10px 14px; gap:8px;">

    <div style="display:flex; align-items:flex-end; justify-content:center; gap:10px;">
      <div style="text-align:center;">
        <div style="font-size:10px; color:white; font-weight:800;">פתיחת ההרשמה</div>
        <div style="font-size:11px; font-weight:800; color:#F5821F; direction:ltr;">29.3.2026</div>
      </div>

      <div style="color:rgba(245,130,31,0.55); font-size:12px; line-height:1;">›</div>

      <div style="text-align:center;">
        <div style="font-size:10px; color:white; font-weight:800;">סגירת הרשמה</div>
        <div style="font-size:11px; font-weight:800; color:#F5821F; direction:ltr;">1.5.2026</div>
      </div>

      <div style="color:rgba(245,130,31,0.55); font-size:12px; line-height:1;">›</div>

      <div style="text-align:center;">
        <div style="font-size:10px; color:white; font-weight:800;">אירוע ההאקתון</div>
        <div style="font-size:11px; font-weight:800; color:#F5821F; direction:ltr;">28.5.2026</div>
      </div>
    </div>

    <hr style="border:none; border-top:1px solid rgba(255,255,255,0.1); margin:0;"/>

    <div style="display:flex; gap:8px; align-items:stretch;">
      <div style="flex:1; min-width:0; background:rgba(245,130,31,0.12); border:1px solid rgba(245,130,31,0.7); border-radius:10px; height:74px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
        <div style="font-size:14px; font-weight:900; color:#F5821F; line-height:1.15; direction:ltr;">09:00-20:00</div>
        <div style="font-size:9px; color:rgba(255,255,255,0.62); margin-top:6px;">יום שלם</div>
      </div>

      <div style="flex:1; min-width:0; background:rgba(245,130,31,0.12); border:1px solid rgba(245,130,31,0.7); border-radius:10px; height:74px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
        <div style="font-size:14px; font-weight:900; color:#F5821F; line-height:1.15; direction:ltr;">4 - 6</div>
        <div style="font-size:9px; color:rgba(255,255,255,0.62); margin-top:6px;">בצוות</div>
      </div>

      <div style="flex:1; min-width:0; background:rgba(245,130,31,0.12); border:1px solid rgba(245,130,31,0.7); border-radius:10px; height:74px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
        <div style="font-size:14px; font-weight:900; color:#F5821F; line-height:1.15;">מרכז הארץ</div>
        <div style="font-size:9px; color:rgba(255,255,255,0.62); margin-top:6px;">מיקום בהמשך</div>
      </div>
    </div>

    <hr style="border:none; border-top:1px solid rgba(255,255,255,0.1); margin:0;"/>

    <div style="display:flex; flex-wrap:nowrap; justify-content:center; gap:5px;">
      <div style="background:rgba(245,130,31,0.15); border:1px solid rgba(245,130,31,0.75); border-radius:11px; padding:4px 8px; font-size:7px; color:white; white-space:nowrap;">בריאות</div>
      <div style="background:rgba(245,130,31,0.15); border:1px solid rgba(245,130,31,0.75); border-radius:11px; padding:4px 8px; font-size:7px; color:white; white-space:nowrap;">חינוך</div>
      <div style="background:rgba(245,130,31,0.15); border:1px solid rgba(245,130,31,0.75); border-radius:11px; padding:4px 8px; font-size:7px; color:white; white-space:nowrap;">חוסן קהילתי</div>
      <div style="background:rgba(245,130,31,0.15); border:1px solid rgba(245,130,31,0.75); border-radius:11px; padding:4px 8px; font-size:7px; color:white; white-space:nowrap;">GovTech</div>
      <div style="background:rgba(245,130,31,0.15); border:1px solid rgba(245,130,31,0.75); border-radius:11px; padding:4px 8px; font-size:7px; color:white; white-space:nowrap;">קיימות</div>
    </div>
  </div>

  <div style="width:100px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px 8px 16px; border-right:1px solid rgba(245,130,31,0.3); gap:10px;">
    <div style="padding:6px 12px; border:1px solid rgba(245,130,31,0.75); border-radius:18px; background:rgba(245,130,31,0.08);">
      <div style="font-size:16px; font-weight:800; color:white; text-align:center; line-height:1.2;">לפרטים נוספים</div>
      <a href="mailto:anat@isef.org.il" style="font-size:11px; font-weight:700; color:#F5821F; text-decoration:none; direction:ltr; display:block;">anat@isef.org.il</a>
    </div>
  </div>

  <div style="position:absolute; bottom:0; left:0; right:0; height:4px; background:#F5821F;"></div>
</div>

</body>
</html>
